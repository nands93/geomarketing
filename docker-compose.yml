services:

  api:
    build: .
    container_name: geomarketing_api
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/app/dados_processados
      - ALLOWED_ESTADOS=RJ,SP
      - ENFORCE_ALLOWED_ESTADOS=1
      - RATE_LIMIT_ENABLED=1
      - RATE_LIMIT_WINDOW_SECONDS=60
      - RATE_LIMIT_MAX_REQUESTS=30
      - RATE_LIMIT_PATH_PREFIXES=/renda/cep,/renda/ponto
    volumes:
      - ./dados_processados:/app/dados_processados:ro
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8000"

  redis:
    image: redis:7-alpine
    container_name: geomarketing_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: geomarketing_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api

volumes:
  redis_data: