name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do sistema (GeoPandas)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libspatialindex-dev

      - name: Instalar dependências Python
        run: pip install -r requirements.txt pytest

      - name: Rodar testes
        env:
          REDIS_URL: redis://localhost:6379
        run: pytest tests/ -v